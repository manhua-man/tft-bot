# Input mode configuration
input:
  # hotkey: use keyboard keys 1-5 for shop slots
  # mouse: click on shop slot center coordinates
  # auto: try hotkey first, fall back to mouse
  mode: "hotkey"
  # Hotkey mapping for buy/level/reroll
  hotkeys:
    buy_slot_1: "1"
    buy_slot_2: "2"
    buy_slot_3: "3"
    buy_slot_4: "4"
    buy_slot_5: "5"
    reroll: "d"
    buy_xp: "f"
    level_up: "f"
  # Mouse click delay (ms) between actions
  click_delay_ms: 50
  # Foreground window before input
  ensure_foreground: true
