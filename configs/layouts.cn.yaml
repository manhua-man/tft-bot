# Layout configurations for Chinese server (国服)
#
# Each layout defines screen regions in REFERENCE coordinates (1024x768).
# Use `executor-probe calibrate` to generate/verify these for your resolution.
#
# Regions are (left, top, right, bottom) in reference space.
# They get scaled to the actual window size via `scale_rect()`.

# Default layout at 1024x768 reference
default_1024x768:
  resolution: "1024x768"
  shop_slots:
    - name: "slot_0"
      region: [110.0, 685.0, 260.0, 720.0]
    - name: "slot_1"
      region: [275.0, 685.0, 425.0, 720.0]
    - name: "slot_2"
      region: [440.0, 685.0, 590.0, 720.0]
    - name: "slot_3"
      region: [605.0, 685.0, 755.0, 720.0]
    - name: "slot_4"
      region: [770.0, 685.0, 920.0, 720.0]
  gold_region: [860.0, 730.0, 950.0, 760.0]
  # Health region (for M4 redline)
  health_region: [475.0, 25.0, 550.0, 50.0]
  # Round/stage region
  round_region: [480.0, 5.0, 545.0, 25.0]
  # Phase indicator region (shop bar area)
  phase_region: [0.0, 650.0, 1024.0, 768.0]
  # Augment slots (3 choices during augment rounds)
  # Approximate center positions for 1024x768
  augment_slots:
    - name: "augment_left"
      region: [170.0, 250.0, 370.0, 420.0]
      click_center: [270.0, 335.0]
    - name: "augment_center"
      region: [390.0, 250.0, 634.0, 420.0]
      click_center: [512.0, 335.0]
    - name: "augment_right"
      region: [654.0, 250.0, 854.0, 420.0]
      click_center: [754.0, 335.0]
  # Bench slots (7 bench positions)
  bench_regions:
    - [280.0, 570.0, 340.0, 610.0]
    - [350.0, 570.0, 410.0, 610.0]
    - [420.0, 570.0, 480.0, 610.0]
    - [490.0, 570.0, 550.0, 610.0]
    - [560.0, 570.0, 620.0, 610.0]
    - [630.0, 570.0, 690.0, 610.0]
    - [700.0, 570.0, 760.0, 610.0]

